<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Diagram Penjualan (Mobile)</title>

<!-- Fonts & icons -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #061223;
    color: #fff;
    padding: 16px;
  }

  /* --- Hanya tampil di mobile --- */
  @media (min-width: 769px) {
    body::before {
      content: "⚠️ Tampilan ini hanya tersedia di versi mobile (maks 768px)";
      display: block;
      text-align: center;
      padding: 50px;
      color: #ccc;
    }
    main { display: none; }
  }

  header {
    text-align: center;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 18px;
    margin: 0;
  }
  p { font-size: 12px; color: #9aa6bf; }

  /* --- Pencarian --- */
  .search-box {
    display: flex;
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 6px 10px;
    margin-bottom: 14px;
  }
  .search-box input {
    flex: 1;
    border: none;
    background: transparent;
    color: white;
    outline: none;
    font-size: 14px;
  }

  canvas {
    width: 100%;
    height: 250px;
  }
</style>
</head>

<body>
<main>
  <header>
    <h1>Diagram Penjualan</h1>
    <p id="tanggal"></p>
  </header>

  <div class="search-box">
    <input type="text" id="cari" placeholder="Cari nama sales atau prinsipal...">
  </div>

  <canvas id="chartPenjualan"></canvas>
</main>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSsuAaCc-lOGa8xgqCyHWCYHqqQkK0TC2j5mVUX8QG3xfkW49PMhWmb3D4iiQcAYAWPmDMiDDAa8JM-/pub?gid=0&single=true&output=csv";
let semuaData = [];
let chart;

async function ambilData() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();
  const rows = text.trim().split("\n").map(r => r.split(","));
  const [header, ...data] = rows;
  semuaData = data.map(r => {
    const obj = {};
    header.forEach((h,i)=>obj[h]=r[i]);
    obj.Penjualan = Number(obj.Penjualan) || 0;
    return obj;
  });
  tampilkanChart(semuaData);
}

function tampilkanChart(data){
  const ctx = document.getElementById('chartPenjualan');
  const bulan = [...new Set(data.map(d=>d.Bulan))];
  const totalPerBulan = bulan.map(b=>data.filter(x=>x.Bulan===b).reduce((s,y)=>s+y.Penjualan,0));

  if(chart) chart.destroy();
  chart = new Chart(ctx,{
    type:'bar',
    data:{
      labels: bulan,
      datasets:[{
        label:'Total Penjualan',
        data: totalPerBulan,
        backgroundColor:'rgba(0,123,255,0.7)',
        borderRadius:6
      }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#ccc'}},y:{ticks:{color:'#ccc'}}}
    }
  });
}

document.getElementById('cari').addEventListener('input', e=>{
  const q = e.target.value.toLowerCase();
  const hasil = semuaData.filter(d=>
    d.Sales.toLowerCase().includes(q) ||
    d.Prinsipal.toLowerCase().includes(q)
  );
  tampilkanChart(hasil.length ? hasil : semuaData);
});

document.getElementById('tanggal').textContent = new Date().toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
ambilData();
</script>
</body>
</html>
